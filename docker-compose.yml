volumes:
  db-dev:

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER: ${USER:-user}
        PASSWORD: ${PASSWORD:-password}
    environment:
      - APACHE_RUN_USER=${USER:-user}
      - APACHE_RUN_GROUP=${USER:-user}
      - LC_CDPATH=/var/www/html
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    ports:
      - ${WEB_PORT:-8080}:80
    depends_on:
      - db
  
  db:
    image: mariadb:10.7
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-db}
      MYSQL_ROOT_PASSWORD: ${USER_DB_PASSWORD:-QWEasd123!}
      MYSQL_USER: ${USER:-user}
      MYSQL_PASSWORD: ${PASSWORD:-password}
    volumes:
      - db-dev:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    ports:
      - ${WEB_PORT_PHPMYADMIN:-8081}:80
    environment:
      - PMA_HOST=db
    depends_on:
      - db
